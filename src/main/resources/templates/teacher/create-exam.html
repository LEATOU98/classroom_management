<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tạo bài kiểm tra - Giáo viên</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        .form-section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #ffc107;
        }
    </style>
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">
    <div th:replace="~{fragments/header :: header}"></div>
    <div th:replace="~{fragments/sidebar :: teacherSidebar}"></div>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <h1 class="m-0">Tạo bài kiểm tra mới</h1>
                <p class="text-muted">Giáo viên: <strong th:text="${currentUser.fullName}"></strong></p>
            </div>
        </div>

        <section class="content">
            <div class="container-fluid">
                <form th:action="@{/teacher/exams/create}" method="post" th:object="${exam}">
                    <!-- Thông tin cơ bản -->
                    <div class="form-section">
                        <h5><i class="fas fa-info-circle mr-2"></i>Thông tin bài kiểm tra</h5>

                        <div class="alert alert-info">
                            <i class="fas fa-info-circle mr-1"></i>
                            Bài kiểm tra sẽ được tạo bởi: <strong th:text="${currentUser.fullName}"></strong>
                        </div>

                        <div class="form-group">
                            <label><i class="fas fa-star mr-1"></i>Tên bài kiểm tra *</label>
                            <input type="text" th:field="*{examName}" class="form-control form-control-lg"
                                   placeholder="VD: Kiểm tra giữa kỳ, Kiểm tra 15 phút..." required>
                        </div>

                        <div class="form-group">
                            <label><i class="fas fa-align-left mr-1"></i>Mô tả</label>
                            <textarea th:field="*{description}" class="form-control" rows="3"
                                      placeholder="Mô tả về bài kiểm tra..."></textarea>
                        </div>
                    </div>

                    <!-- Khóa học & Thời gian -->
                    <div class="form-section" style="border-left-color: #007bff;">
                        <h5><i class="fas fa-cog mr-2"></i>Thiết lập</h5>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label><i class="fas fa-book mr-1"></i>Khóa học *</label>
                                    <select name="courseId" class="form-control form-control-lg" required>
                                        <option value="">-- Chọn khóa học --</option>
                                        <option th:each="course : ${myCourses}"
                                                th:value="${course.id}"
                                                th:text="${course.courseName}"></option>
                                    </select>
                                    <small class="text-muted">Bài kiểm tra sẽ áp dụng cho học sinh trong khóa học này</small>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label><i class="fas fa-calendar-alt mr-1"></i>Thời gian kiểm tra</label>
                                    <input type="datetime-local" th:field="*{examDate}" class="form-control form-control-lg">
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label><i class="fas fa-trophy mr-1"></i>Điểm tối đa</label>
                                    <input type="number" th:field="*{maxScore}" class="form-control"
                                           step="0.1" min="0" value="10.0">
                                    <small class="text-muted">Mặc định: 10 điểm</small>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label><i class="fas fa-check-circle mr-1"></i>Điểm đạt</label>
                                    <input type="number" th:field="*{passScore}" class="form-control"
                                           step="0.1" min="0" value="5.0">
                                    <small class="text-muted">Mặc định: 5 điểm</small>
                                </div>
                            </div>
                        </div>
                    </div>

                    <hr>
                    <div class="d-flex justify-content-between">
                        <button type="submit" class="btn btn-warning btn-lg">
                            <i class="fas fa-save mr-1"></i> Tạo bài kiểm tra
                        </button>
                        <a href="/teacher/exams" class="btn btn-outline-secondary btn-lg">
                            <i class="fas fa-arrow-left mr-1"></i> Quay lại
                        </a>
                    </div>
                </form>
            </div>
        </section>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/js/adminlte.min.js"></script>
</body>
</html>
