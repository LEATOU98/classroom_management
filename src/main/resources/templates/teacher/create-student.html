<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo học sinh mới - Giáo viên</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">
    <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" data-widget="pushmenu" href="#" role="button">
                    <i class="fas fa-bars"></i>
                </a>
            </li>
            <li class="nav-item d-none d-sm-inline-block">
                <span class="navbar-brand ml-2"><i class="fas fa-school"></i> Hệ thống Quản lý Lớp học</span>
            </li>
        </ul>
        <ul class="navbar-nav ml-auto">
            <li class="nav-item">
                <a href="/logout" class="btn btn-outline-danger btn-sm">
                    <i class="fas fa-sign-out-alt"></i> Đăng xuất
                </a>
            </li>
        </ul>
    </nav>

    <aside class="main-sidebar sidebar-dark-primary elevation-4">
        <a href="/teacher/profile" class="brand-link">
            <i class="fas fa-chalkboard-teacher fa-2x mr-2"></i>
            <span class="brand-text font-weight-light">Giáo viên</span>
        </a>
        <div class="sidebar">
            <div class="user-panel mt-3 pb-3 mb-3 d-flex">
                <div class="image"><i class="fas fa-user-tie fa-2x text-success"></i></div>
                <div class="info"><a href="#" class="d-block" th:text="${currentUser.fullName}"></a></div>
            </div>
            <nav class="mt-2">
                <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu">
                    <li class="nav-item">
                        <a href="/teacher/profile" class="nav-link">
                            <i class="nav-icon fas fa-id-card"></i><p>Hồ sơ cá nhân</p>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/teacher/courses" class="nav-link">
                            <i class="nav-icon fas fa-book"></i><p>Quản lý khóa học</p>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/teacher/students/create" class="nav-link active">
                            <i class="nav-icon fas fa-user-plus"></i><p>Tạo học sinh</p>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </aside>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <h1 class="m-0">Tạo học sinh mới</h1>
                <p class="text-muted">Học sinh sẽ được gán cho bạn: <strong th:text="${currentUser.fullName}"></strong></p>
            </div>
        </div>

        <section class="content">
            <div class="container-fluid">
                <div class="card">
                    <div class="card-header bg-primary">
                        <h5 class="card-title text-white mb-0">
                            <i class="fas fa-user-graduate mr-2"></i>Thông tin học sinh
                        </h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/teacher/students/create}" method="post" th:object="${user}">
                            <!-- Role mặc định là STUDENT (ẩn) -->
                            <input type="hidden" name="role" value="STUDENT">

                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label><i class="fas fa-user mr-1"></i>Tên đăng nhập *</label>
                                        <input type="text" th:field="*{username}" class="form-control" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label><i class="fas fa-lock mr-1"></i>Mật khẩu *</label>
                                        <input type="text" th:field="*{password}" class="form-control" required>
                                    </div>
                                </div>
                            </div>

                            <div class="form-group">
                                <label><i class="fas fa-id-card mr-1"></i>Họ và tên *</label>
                                <input type="text" th:field="*{fullName}" class="form-control" required>
                            </div>

                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label><i class="fas fa-envelope mr-1"></i>Email</label>
                                        <input type="email" th:field="*{email}" class="form-control">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label><i class="fas fa-phone mr-1"></i>Số điện thoại</label>
                                        <input type="text" th:field="*{phone}" class="form-control">
                                    </div>
                                </div>
                            </div>

                            <div class="form-group">
                                <label><i class="fas fa-sticky-note mr-1"></i>Ghi chú</label>
                                <textarea th:field="*{note}" class="form-control" rows="2"></textarea>
                            </div>

                            <!-- Hiển thị teacher info -->
                            <div class="alert alert-info">
                                <i class="fas fa-info-circle mr-1"></i>
                                Giáo viên phụ trách: <strong th:text="${currentUser.fullName}"></strong>
                            </div>

                            <!-- Chọn khóa học -->
                            <div class="form-group">
                                <label><i class="fas fa-book mr-1"></i>Đăng ký khóa học (tùy chọn)</label>
                                <select name="courseId" class="form-control">
                                    <option value="">-- Chọn khóa học --</option>
                                    <option th:each="course : ${myCourses}"
                                            th:value="${course.id}"
                                            th:text="${course.courseName}"></option>
                                </select>
                            </div>

                            <hr>
                            <button type="submit" class="btn btn-success btn-lg">
                                <i class="fas fa-save mr-1"></i> Tạo học sinh
                            </button>
                            <a href="/teacher/courses" class="btn btn-secondary btn-lg">
                                <i class="fas fa-times mr-1"></i> Hủy
                            </a>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <footer class="main-footer">
        <strong>Copyright &copy; 2024 Classroom Management.</strong> All rights reserved.
    </footer>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/js/adminlte.min.js"></script>
</body>
</html>
