<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sửa bài kiểm tra - Giáo viên</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">
    <div th:replace="~{fragments/header :: header}"></div>
    <div th:replace="~{fragments/sidebar :: teacherSidebar}"></div>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <h1 class="m-0">Sửa bài kiểm tra</h1>
                <p class="text-muted">Giáo viên: <strong th:text="${currentUser.fullName}"></strong> | Mã: <strong th:text="${exam.examCode}"></strong></p>
            </div>
        </div>
        <section class="content">
            <div class="container-fluid">
                <div class="card">
                    <div class="card-header bg-warning">
                        <h5 class="card-title text-dark mb-0">
                            <i class="fas fa-edit mr-2"></i>Chỉnh sửa: <span th:text="${exam.examName}"></span>
                        </h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/teacher/exams/edit/{id}(id=${exam.id})}" method="post" th:object="${exam}">
                            <div class="row">
                                <div class="col-md-8">
                                    <div class="form-group">
                                        <label><i class="fas fa-star mr-1"></i>Tên bài kiểm tra *</label>
                                        <input type="text" th:field="*{examName}" class="form-control" required>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="form-group">
                                        <label><i class="fas fa-barcode mr-1"></i>Mã bài</label>
                                        <input type="text" th:field="*{examCode}" class="form-control" readonly>
                                    </div>
                                </div>
                            </div>

                            <div class="form-group">
                                <label><i class="fas fa-align-left mr-1"></i>Mô tả</label>
                                <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
                            </div>

                            <div class="row">
                                <div class="col-md-4">
                                    <div class="form-group">
                                        <label><i class="fas fa-book mr-1"></i>Khóa học *</label>
                                        <select name="courseId" id="courseSelect" class="form-control" required onchange="loadCourseGroups()">
                                            <option value="">-- Chọn --</option>
                                            <option th:each="c : ${myCourses}"
                                                    th:value="${c.id}"
                                                    th:text="${c.courseName}"
                                                    th:selected="${exam.course.id == c.id}"></option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="form-group">
                                        <label><i class="fas fa-layer-group mr-1"></i>Nhóm (tùy chọn)</label>
                                        <select name="groupId" id="groupSelect" class="form-control">
                                            <option value="">-- Tất cả nhóm --</option>
                                            <option th:each="g : ${courseGroups}"
                                                    th:value="${g.id}"
                                                    th:text="${g.groupName}"
                                                    th:selected="${exam.group != null && exam.group.id == g.id}"></option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="form-group">
                                        <label><i class="fas fa-calendar-alt mr-1"></i>Thời gian kiểm tra</label>
                                        <input type="datetime-local" th:field="*{examDate}" class="form-control">
                                    </div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label><i class="fas fa-trophy mr-1"></i>Điểm tối đa</label>
                                        <input type="number" th:field="*{maxScore}" class="form-control" step="0.1" min="0">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label><i class="fas fa-check-circle mr-1"></i>Điểm đạt</label>
                                        <input type="number" th:field="*{passScore}" class="form-control" step="0.1" min="0">
                                    </div>
                                </div>
                            </div>

                            <hr>
                            <div class="d-flex justify-content-between">
                                <div>
                                    <button type="submit" class="btn btn-warning btn-lg">
                                        <i class="fas fa-save mr-1"></i> Cập nhật
                                    </button>
                                    <a href="/teacher/exams" class="btn btn-outline-secondary btn-lg">
                                        <i class="fas fa-arrow-left mr-1"></i> Quay lại
                                    </a>
                                </div>
                                <a th:href="@{/teacher/exams/delete/{id}(id=${exam.id})}"
                                   class="btn btn-danger btn-lg"
                                   onclick="return confirm('Xác nhận xóa bài kiểm tra này? Tất cả điểm số sẽ bị xóa!')">
                                    <i class="fas fa-trash mr-1"></i> Xóa bài kiểm tra
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/js/adminlte.min.js"></script>
<script>
    function loadCourseGroups() {
        var cid = $('#courseSelect').val();
        if (cid) {
            $.get('/admin/getGroupsByCourse/' + cid, function(groups) {
                var opts = '<option value="">-- Tất cả nhóm --</option>';
                groups.forEach(g => opts += '<option value="' + g.id + '">' + g.groupName + '</option>');
                $('#groupSelect').html(opts);
            });
        }
    }
</script>
</body>
</html>
