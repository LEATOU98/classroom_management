<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giáo viên Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="#">Quản lý Lớp học - Giáo viên</a>
        <div class="navbar-nav ms-auto">
            <span class="nav-link text-light">Xin chào, <span th:text="${teacher.fullName}"></span></span>
            <a class="nav-link" href="/teacher/profile">Hồ sơ</a>
            <a class="btn btn-danger btn-sm" href="/logout">Đăng xuất</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Khóa học của tôi</h2>
        <a href="/teacher/courses/create" class="btn btn-success">Tạo khóa học mới</a>
    </div>

    <div class="row">
        <div class="col-md-4 mb-3" th:each="course : ${courses}">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title" th:text="${course.courseName}"></h5>
                    <p class="card-text">
                        <small class="text-muted" th:text="${course.courseCode}"></small><br>
                        Giá: <span th:text="${course.pricePerSession}"></span> VNĐ/buổi<br>
                        Bắt đầu: <span th:text="${course.startDate}"></span><br>
                        Kết thúc: <span th:text="${course.endDate}"></span>
                    </p>
                    <div class="btn-group">
                        <a th:href="@{/teacher/courses/{id}/students(id=${course.id})}"
                           class="btn btn-info btn-sm">Học viên</a>
                        <a th:href="@{/teacher/courses/edit/{id}(id=${course.id})}"
                           class="btn btn-warning btn-sm">Sửa</a>
                        <a th:href="@{/teacher/courses/delete/{id}(id=${course.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Xác nhận xóa?')">Xóa</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
