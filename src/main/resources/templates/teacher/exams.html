<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Bài kiểm tra - Giáo viên</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        .exam-card {
            border-left: 4px solid #007bff;
            transition: 0.3s;
            margin-bottom: 15px;
        }

        .exam-card:hover {
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transform: translateY(-3px);
        }

        .exam-code {
            font-size: 0.8em;
            color: #6c757d;
        }

        .status-badge {
            font-size: 0.85em;
        }
    </style>
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">
    <div th:replace="~{fragments/header :: header}"></div>
    <div th:replace="~{fragments/sidebar :: teacherSidebar}"></div>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6">
                        <h1 class="m-0">Quản lý Bài kiểm tra</h1>
                    </div>
                    <div class="col-sm-6">
                        <ol class="breadcrumb float-sm-right">
                            <li class="breadcrumb-item"><a href="/teacher/profile">Home</a></li>
                            <li class="breadcrumb-item active">Bài kiểm tra</li>
                        </ol>
                    </div>
                </div>
            </div>
        </div>

        <section class="content">
            <div class="container-fluid">
                <!-- Filter -->
                <div class="card mb-3">
                    <div class="card-body">
                        <form th:action="@{/teacher/exams}" method="get" class="row align-items-end">
                            <div class="col-md-4 mb-2">
                                <label><i class="fas fa-search mr-1"></i>Tìm kiếm</label>
                                <div class="input-group">
                                    <input type="text" name="search" class="form-control"
                                           placeholder="Tên bài kiểm tra, khóa học..." th:value="${searchKeyword}">
                                    <div class="input-group-append">
                                        <button type="submit" class="btn btn-primary">
                                            <i class="fas fa-search"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3 mb-2">
                                <label><i class="fas fa-book mr-1"></i>Khóa học</label>
                                <select name="courseId" class="form-control" onchange="this.form.submit()">
                                    <option value="">Tất cả khóa học</option>
                                    <option th:each="course : ${myCourses}"
                                            th:value="${course.id}"
                                            th:text="${course.courseName}"
                                            th:selected="${selectedCourseId == course.id}"></option>
                                </select>
                            </div>
                            <div class="col-md-2 mb-2">
                                <label>&nbsp;</label>
                                <a href="/teacher/exams" class="btn btn-outline-secondary btn-block">
                                    <i class="fas fa-redo"></i> Reset
                                </a>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Button tạo mới -->
                <div class="mb-3">
                    <a href="/teacher/exams/create" class="btn btn-success btn-lg">
                        <i class="fas fa-plus-circle mr-1"></i> Tạo bài kiểm tra mới
                    </a>
                </div>

                <!-- Danh sách bài kiểm tra -->
                <div class="row">
                    <div class="col-12" th:if="${#lists.isEmpty(exams)}">
                        <div class="alert alert-info text-center py-5">
                            <i class="fas fa-star fa-4x mb-3 text-muted"></i>
                            <h4>Chưa có bài kiểm tra nào!</h4>
                            <p>Tạo bài kiểm tra đầu tiên cho học sinh của bạn.</p>
                            <a href="/teacher/exams/create" class="btn btn-primary btn-lg">
                                <i class="fas fa-plus"></i> Tạo ngay
                            </a>
                        </div>
                    </div>

                    <div class="col-md-4" th:each="exam : ${exams}">
                        <div class="card exam-card">
                            <div class="card-header">
                                <h5 class="card-title mb-0">
                                    <i class="fas fa-star text-warning mr-2"></i>
                                    <span th:text="${exam.examName}"></span>
                                </h5>
                                <small class="exam-code" th:text="${exam.examCode}"></small>
                            </div>
                            <div class="card-body">
                                <p class="mb-2" th:if="${exam.description}">
                                    <i class="fas fa-align-left mr-1"></i>
                                    <span th:text="${exam.description}"></span>
                                </p>
                                <p class="mb-1">
                                    <i class="fas fa-book mr-1 text-primary"></i>
                                    <strong>Khóa:</strong>
                                    <span class="badge badge-primary" th:text="${exam.course.courseName}"></span>
                                </p>
                                <p class="mb-1">
                                    <i class="fas fa-calendar-alt mr-1 text-info"></i>
                                    <strong>Ngày kiểm tra:</strong>
                                    <span th:text="${#temporals.format(exam.examDate, 'dd/MM/yyyy HH:mm')}"></span>
                                </p>
                                <p class="mb-1">
                                    <i class="fas fa-check-circle mr-1 text-success"></i>
                                    <strong>Điểm đạt:</strong>
                                    <span th:text="${exam.passScore}"></span>/<span th:text="${exam.maxScore}"></span>
                                </p>
                                <p class="mb-0">
                                    <i class="fas fa-users mr-1 text-warning"></i>
                                    <strong>Đã chấm:</strong>
                                    <span class="badge badge-info">Xem chi tiết</span>
                                </p>
                            </div>
                            <div class="card-footer">
                                <div class="btn-group btn-group-sm">
                                    <a th:href="@{/teacher/exams/{id}/scores(id=${exam.id})}" class="btn btn-info"
                                       title="Chấm điểm">
                                        <i class="fas fa-star"></i>
                                    </a>
                                    <a th:href="@{/teacher/exams/edit/{id}(id=${exam.id})}" class="btn btn-warning"
                                       title="Sửa">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <a th:href="@{/teacher/exams/delete/{id}(id=${exam.id})}" class="btn btn-danger"
                                       title="Xóa"
                                       onclick="return confirm('Xác nhận xóa bài kiểm tra này?')">
                                        <i class="fas fa-trash"></i>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/js/adminlte.min.js"></script>
</body>
</html>
