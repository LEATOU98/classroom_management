<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý khóa học - Giáo viên</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <style>
        .course-badge {
            font-size: 0.8em;
            padding: 3px 10px;
            border-radius: 15px;
        }
    </style>
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">

    <!-- HEADER - Fragment -->
    <div th:replace="~{fragments/header :: header}"></div>

    <!-- SIDEBAR TEACHER - Fragment -->
    <div th:replace="~{fragments/sidebar :: teacherSidebar}"></div>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <h1 class="m-0">Khóa học của tôi</h1>
            </div>
        </div>

        <section class="content">
            <div class="container-fluid">
                <!-- Filter -->
                <div class="mb-3">
                    <form th:action="@{/teacher/courses}" method="get" class="row">
                        <div class="col-md-6">
                            <div class="input-group">
                                <input type="text" name="search" class="form-control"
                                       placeholder="Tìm kiếm khóa học..." th:value="${searchKeyword}">
                                <div class="input-group-append">
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fas fa-search"></i>
                                    </button>
                                    <a href="/teacher/courses" class="btn btn-outline-secondary">
                                        <i class="fas fa-redo"></i>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>

                <!-- Table -->
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">
                            <i class="fas fa-list mr-2"></i>Danh sách khóa học
                            <span class="badge badge-primary ml-2" th:text="${#lists.size(courses)}"></span>
                        </h3>
                        <div class="card-tools">
                            <a href="/teacher/courses/create" class="btn btn-success btn-sm">
                                <i class="fas fa-plus"></i> Tạo khóa học mới
                            </a>
                        </div>
                    </div>
                    <div class="card-body table-responsive p-0">
                        <table class="table table-hover">
                            <thead>
                            <tr>
                                <th>STT</th>
                                <th>Tên khóa học</th>
                                <th>Mã khóa</th>
                                <th>Bắt đầu</th>
                                <th>Kết thúc</th>
                                <th>Tính tiền</th>
                                <th>Hành động</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="course, iterStat : ${courses}">
                                <td th:text="${iterStat.index + 1}"></td>
                                <td><strong th:text="${course.courseName}"></strong></td>
                                <td><small class="text-muted" th:text="${course.courseCode}"></small></td>
                                <td>
                                    <span class="course-badge bg-info text-white" th:text="${course.formattedStartDate}"></span>
                                </td>
                                <td>
                                    <span class="course-badge bg-secondary text-white" th:text="${course.formattedEndDate}"></span>
                                </td>
                                <td>
                                    <span class="course-badge bg-warning" th:text="${course.paymentDayDisplay}"></span>
                                </td>
                                <td>
                                    <div class="btn-group btn-group-sm">
                                        <a th:href="@{/teacher/courses/{id}/students(id=${course.id})}"
                                           class="btn btn-info" title="Xem học viên">
                                            <i class="fas fa-users"></i>
                                        </a>
                                        <a th:href="@{/teacher/courses/edit/{id}(id=${course.id})}"
                                           class="btn btn-warning" title="Sửa">
                                            <i class="fas fa-edit"></i>
                                        </a>
                                        <a th:href="@{/teacher/courses/delete/{id}(id=${course.id})}"
                                           class="btn btn-danger" title="Xóa"
                                           onclick="return confirm('Xác nhận xóa?')">
                                            <i class="fas fa-trash"></i>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(courses)}">
                                <td colspan="7" class="text-center py-4">
                                    <i class="fas fa-book-open fa-3x text-muted mb-2"></i>
                                    <p>Chưa có khóa học nào</p>
                                    <a href="/teacher/courses/create" class="btn btn-primary">
                                        <i class="fas fa-plus"></i> Tạo khóa học đầu tiên
                                    </a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- FOOTER - Fragment -->
    <div th:replace="~{fragments/footer :: footer}"></div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/js/adminlte.min.js"></script>
</body>
</html>
