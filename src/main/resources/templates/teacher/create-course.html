<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo khóa học mới - Giáo viên</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <style>
        .form-section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #007bff;
        }
        .form-section.pricing { border-left-color: #28a745; }
        .form-section.schedule { border-left-color: #ffc107; }
    </style>
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">

    <!-- HEADER - Fragment -->
    <div th:replace="~{fragments/header :: header}"></div>

    <!-- SIDEBAR TEACHER - Fragment -->
    <div th:replace="~{fragments/sidebar :: teacherSidebar}"></div>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <h1 class="m-0">Tạo khóa học mới</h1>
                <p class="text-muted">Giáo viên: <strong th:text="${currentUser.fullName}"></strong></p>
            </div>
        </div>

        <section class="content">
            <div class="container-fluid">
                <form th:action="@{/teacher/courses/create}" method="post" th:object="${course}">
                    <!-- Thông tin cơ bản -->
                    <div class="form-section">
                        <h5><i class="fas fa-info-circle mr-2"></i>Thông tin khóa học</h5>
                        <div class="form-group">
                            <label>Tên khóa học *</label>
                            <input type="text" th:field="*{courseName}" class="form-control form-control-lg"
                                   placeholder="Nhập tên khóa học..." required>
                        </div>
                        <div class="alert alert-info">
                            <i class="fas fa-info-circle mr-1"></i>
                            Khóa học sẽ được tạo với giáo viên: <strong th:text="${currentUser.fullName}"></strong>
                        </div>
                    </div>

                    <!-- Học phí -->
                    <div class="form-section pricing">
                        <h5><i class="fas fa-dollar-sign mr-2"></i>Học phí</h5>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>Giá mỗi buổi/học sinh (VNĐ)</label>
                                    <div class="input-group">
                                        <input type="number" th:field="*{pricePerSession}"
                                               class="form-control" step="1000" min="0" placeholder="0">
                                        <div class="input-group-append">
                                            <span class="input-group-text">VNĐ</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>Ngày tính tiền hàng tháng</label>
                                    <select th:field="*{paymentDayOfMonth}" class="form-control">
                                        <option value="">-- Chọn ngày --</option>
                                        <option value="-1">Đầu tháng (ngày 1)</option>
                                        <option th:each="day : ${#numbers.sequence(1, 27)}"
                                                th:value="${day}"
                                                th:text="${'Ngày ' + day}"></option>
                                        <option value="0">Cuối tháng (tự động ngày cuối)</option>
                                    </select>
                                    <small class="text-muted">
                                        Cuối tháng: tự động tính 28/29/30/31 tùy tháng
                                    </small>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Thời gian -->
                    <div class="form-section schedule">
                        <h5><i class="fas fa-calendar-alt mr-2"></i>Thời gian</h5>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>Ngày bắt đầu</label>
                                    <input type="date" th:field="*{startDate}" class="form-control">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>Ngày kết thúc</label>
                                    <input type="date" th:field="*{endDate}" class="form-control">
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Ngày bắt đầu tính tiền</label>
                            <input type="date" th:field="*{paymentStartDate}" class="form-control">
                        </div>
                    </div>

                    <hr>
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="fas fa-save mr-1"></i> Tạo khóa học
                    </button>
                    <a href="/teacher/courses" class="btn btn-secondary btn-lg">
                        <i class="fas fa-times mr-1"></i> Hủy
                    </a>
                </form>
            </div>
        </section>
    </div>

    <!-- FOOTER - Fragment -->
    <div th:replace="~{fragments/footer :: footer}"></div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/js/adminlte.min.js"></script>
</body>
</html>
