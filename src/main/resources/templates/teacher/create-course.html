<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo khóa học mới</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2 class="mb-4">Tạo khóa học mới</h2>

    <div class="card">
        <div class="card-body">
            <form th:action="@{/teacher/courses/create}" method="post" th:object="${course}">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Tên khóa học *</label>
                        <input type="text" th:field="*{courseName}" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Giá mỗi buổi/học sinh (VNĐ)</label>
                        <input type="number" th:field="*{pricePerSession}" class="form-control" step="0.01">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Ngày bắt đầu khóa</label>
                        <input type="date" th:field="*{startDate}" class="form-control">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Ngày kết thúc khóa</label>
                        <input type="date" th:field="*{endDate}" class="form-control">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Ngày bắt đầu tính tiền</label>
                        <input type="date" th:field="*{paymentStartDate}" class="form-control">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Ngày tính tiền hàng tháng (1-31)</label>
                        <input type="number" th:field="*{paymentDayOfMonth}" class="form-control" min="1" max="31">
                    </div>
                </div>

                <div class="mt-3">
                    <button type="submit" class="btn btn-primary">Tạo khóa học</button>
                    <a href="/teacher/dashboard" class="btn btn-secondary">Quay lại</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
