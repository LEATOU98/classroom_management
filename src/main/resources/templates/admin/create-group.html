<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo nhóm học - Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">

    <!-- HEADER - Fragment -->
    <div th:replace="~{fragments/header :: header}"></div>

    <!-- SIDEBAR ADMIN - Fragment -->
    <div th:replace="~{fragments/sidebar :: adminSidebar}"></div>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <h1 class="m-0">Tạo nhóm học mới</h1>
            </div>
        </div>
        <section class="content">
            <div class="container-fluid">
                <div class="card">
                    <div class="card-body">
                        <form th:action="@{/admin/groups/create}" method="post" th:object="${group}">
                            <div class="form-group">
                                <label>Tên nhóm *</label>
                                <input type="text" th:field="*{groupName}" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label>Mô tả</label>
                                <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label>Giáo viên *</label>
                                        <select name="teacherId" id="teacherSelect" class="form-control" required onchange="loadCourses()">
                                            <option value="">-- Chọn giáo viên --</option>
                                            <option th:each="teacher : ${teachers}" th:value="${teacher.id}" th:text="${teacher.fullName}"></option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label>Khóa học *</label>
                                        <select name="courseId" id="courseSelect" class="form-control" required>
                                            <option value="">-- Chọn giáo viên trước --</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-success btn-lg"><i class="fas fa-save"></i> Tạo nhóm</button>
                            <a href="/admin/groups" class="btn btn-secondary btn-lg"><i class="fas fa-times"></i> Hủy</a>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- FOOTER - Fragment -->
    <div th:replace="~{fragments/footer :: footer}"></div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/js/adminlte.min.js"></script>
<script>
    function loadCourses() {
        var teacherId = $('#teacherSelect').val();
        if (teacherId) {
            $.get('/admin/getCoursesByTeacher/' + teacherId, function(courses) {
                var options = '<option value="">-- Chọn khóa học --</option>';
                courses.forEach(function(c) {
                    options += '<option value="' + c.id + '">' + c.courseName + '</option>';
                });
                $('#courseSelect').html(options);
            });
        } else {
            $('#courseSelect').html('<option value="">-- Chọn giáo viên trước --</option>');
        }
    }
</script>
</body>
</html>
