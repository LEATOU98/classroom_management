<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">Quản lý Lớp học - Admin</a>
        <div class="navbar-nav ms-auto">
            <span class="nav-link text-light">Xin chào, <span th:text="${admin.fullName}"></span></span>
            <a class="nav-link" href="/admin/courses">Xem khóa học</a>
            <a class="btn btn-danger btn-sm" href="/logout">Đăng xuất</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Quản lý Người dùng</h2>
        <a href="/admin/users/create" class="btn btn-success">
            Tạo người dùng mới
        </a>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Tên đăng nhập</th>
                <th>Họ tên</th>
                <th>Email</th>
                <th>Điện thoại</th>
                <th>Vai trò</th>
                <th>Ngày tạo</th>
                <th>Hành động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.id}"></td>
                <td th:text="${user.username}"></td>
                <td th:text="${user.fullName}"></td>
                <td th:text="${user.email}"></td>
                <td th:text="${user.phone}"></td>
                <td>
                            <span class="badge"
                                  th:classappend="${user.role == 'ADMIN'} ? 'bg-danger' :
                                                   (${user.role == 'TEACHER'} ? 'bg-primary' : 'bg-success')"
                                  th:text="${user.role}"></span>
                </td>
                <td th:text="${user.createdAt}"></td>
                <td>
                    <a th:href="@{/admin/users/edit/{id}(id=${user.id})}"
                       class="btn btn-sm btn-warning">Sửa</a>
                    <a th:href="@{/admin/users/delete/{id}(id=${user.id})}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('Bạn chắc chắn muốn xóa?')">Xóa</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
