<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Học sinh - Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        .debt-green { background: #d4edda; color: #155724; }
        .debt-red { background: #f8d7da; color: #721c24; }
        .debt-yellow { background: #fff3cd; color: #856404; }
        .badge-debt {
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.85em;
        }
        .quick-action-btn {
            padding: 2px 8px;
            font-size: 12px;
        }
        .avatar-student {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">

    <!-- HEADER - Fragment -->
    <div th:replace="~{fragments/header :: header}"></div>

    <!-- SIDEBAR ADMIN - Fragment -->
    <div th:replace="~{fragments/sidebar :: adminSidebar}"></div>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <h1 class="m-0">Quản lý Học sinh & Tài chính</h1>
            </div>
        </div>
        <section class="content">
            <div class="container-fluid">
                <!-- Filter -->
                <div class="card mb-3">
                    <div class="card-body">
                        <form th:action="@{/admin/students}" method="get" class="row align-items-end">
                            <div class="col-md-3 mb-2">
                                <label><i class="fas fa-search"></i> Tìm kiếm</label>
                                <input type="text" name="search" class="form-control" placeholder="Tên, SĐT, email..." th:value="${searchKeyword}">
                            </div>
                            <div class="col-md-2 mb-2">
                                <label>Giáo viên</label>
                                <select name="teacherId" class="form-control" onchange="this.form.submit()">
                                    <option value="">Tất cả</option>
                                    <option th:each="t : ${teachers}" th:value="${t.id}" th:text="${t.fullName}" th:selected="${selectedTeacherId == t.id}"></option>
                                </select>
                            </div>
                            <div class="col-md-2 mb-2">
                                <label>Khóa học</label>
                                <select name="courseId" class="form-control" onchange="this.form.submit()">
                                    <option value="">Tất cả</option>
                                    <option th:each="c : ${filteredCourses}" th:value="${c.id}" th:text="${c.courseName}" th:selected="${selectedCourseId == c.id}"></option>
                                </select>
                            </div>
                            <div class="col-md-2 mb-2">
                                <label>&nbsp;</label>
                                <button type="submit" class="btn btn-primary btn-block"><i class="fas fa-filter"></i> Lọc</button>
                            </div>
                            <div class="col-md-1 mb-2">
                                <label>&nbsp;</label>
                                <a href="/admin/students" class="btn btn-outline-secondary btn-block"><i class="fas fa-redo"></i></a>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Table -->
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">
                            <i class="fas fa-user-graduate mr-2"></i>Danh sách học sinh
                            <span class="badge badge-primary ml-2" th:text="${#lists.size(students)}"></span>
                        </h3>
                    </div>
                    <div class="card-body table-responsive p-0">
                        <table class="table table-hover">
                            <thead>
                            <tr>
                                <th>STT</th>
                                <th>Học sinh</th>
                                <th>Thông tin</th>
                                <th>Khóa học</th>
                                <th>Tình trạng nợ</th>
                                <th>Ghi chú</th>
                                <th>Hành động</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="student, iterStat : ${students}">
                                <td th:text="${iterStat.index + 1}"></td>
                                <td>
                                    <div class="d-flex align-items-center">
                                        <div class="avatar-student mr-2">
                                            <span th:text="${student.fullName != null ? student.fullName.substring(0,1) : '?'}">A</span>
                                        </div>
                                        <div>
                                            <strong th:text="${student.fullName}"></strong>
                                        </div>
                                    </div>
                                </td>
                                <td>
                                    <small class="d-block text-muted">
                                        <i class="fas fa-phone"></i> <span th:text="${student.phone != null ? student.phone : 'N/A'}"></span>
                                    </small>
                                    <small class="d-block text-muted">
                                        <i class="fas fa-envelope"></i> <span th:text="${student.email != null ? student.email : 'N/A'}"></span>
                                    </small>
                                </td>
                                <td>
                                    <span th:each="finance : ${financeMap.get(student.id)}" class="d-block">
                                        <span class="badge badge-info" th:text="${finance.course.courseName}"></span>
                                        <small class="text-muted">(<span th:text="${finance.sessionsCount}"></span> buổi)</small>
                                    </span>
                                    <span th:if="${#lists.isEmpty(financeMap.get(student.id))}" class="text-muted">Chưa đăng ký</span>
                                </td>
                                <td>
                                    <!-- Tạo biến debt để kiểm tra -->
                                    <th:block th:with="debt=${totalDebtMap.get(student.id)}">
                                        <span class="badge badge-debt"
                                              th:classappend="${debt != null && debt > 0} ? 'debt-red' : 'debt-green'">
                                            <span th:if="${debt != null && debt > 0}">
                                                Nợ: <span th:text="${#numbers.formatDecimal(debt, 0, 'COMMA', 0, 'POINT')}"></span> VNĐ
                                            </span>
                                            <span th:if="${debt == null || debt == 0}">
                                                <i class="fas fa-check-circle"></i> Đã thanh toán
                                            </span>
                                        </span>
                                    </th:block>
                                    <!-- Hiển thị nợ theo từng khóa -->
                                    <div th:each="finance : ${financeMap.get(student.id)}" class="mt-1">
                                        <small th:if="${finance.remainingAmount != null && finance.remainingAmount > 0}"
                                               class="d-block text-danger">
                                            <span th:text="${finance.course.courseName}"></span>:
                                            <span th:text="${#numbers.formatDecimal(finance.remainingAmount, 0, 'COMMA', 0, 'POINT')}"></span> VNĐ
                                        </small>
                                    </div>
                                </td>
                                <td>
                                    <small th:text="${student.note != null ? student.note : 'Không có ghi chú'}" class="text-muted"></small>
                                </td>
                                <td>
                                    <div class="btn-group btn-group-sm">
                                        <button class="btn btn-info" th:data-id="${student.id}" onclick="showFinanceDetail(this.getAttribute('data-id'))" title="Chi tiết">
                                            <i class="fas fa-info-circle"></i>
                                        </button>
                                        <button class="btn btn-success" th:data-id="${student.id}" onclick="showPaymentModal(this.getAttribute('data-id'))" title="Đóng tiền">
                                            <i class="fas fa-money-bill-wave"></i>
                                        </button>
                                        <button class="btn btn-warning" th:data-id="${student.id}" onclick="showRecordSession(this.getAttribute('data-id'))" title="Điểm danh">
                                            <i class="fas fa-calendar-plus"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(students)}">
                                <td colspan="7" class="text-center py-4">
                                    <i class="fas fa-user-graduate fa-3x text-muted mb-2"></i>
                                    <p>Chưa có học sinh nào</p>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- FOOTER - Fragment -->
    <div th:replace="~{fragments/footer :: footer}"></div>

</div>

<!-- Modal Chi tiết tài chính -->
<div class="modal fade" id="financeDetailModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-info text-white">
                <h5 class="modal-title"><i class="fas fa-file-invoice-dollar mr-2"></i>Chi tiết tài chính</h5>
                <button type="button" class="close text-white" data-dismiss="modal">&times;</button>
            </div>
            <div class="modal-body" id="financeDetailContent">
                <div class="text-center"><i class="fas fa-spinner fa-spin fa-3x"></i></div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Đóng tiền -->
<div class="modal fade" id="paymentModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title"><i class="fas fa-money-bill-wave mr-2"></i>Đóng tiền học</h5>
                <button type="button" class="close text-white" data-dismiss="modal">&times;</button>
            </div>
            <div class="modal-body" id="paymentContent">
                <div class="text-center"><i class="fas fa-spinner fa-spin fa-3x"></i></div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Điểm danh -->
<div class="modal fade" id="recordSessionModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-warning">
                <h5 class="modal-title"><i class="fas fa-calendar-check mr-2"></i>Ghi nhận buổi học</h5>
                <button type="button" class="close" data-dismiss="modal">&times;</button>
            </div>
            <div class="modal-body" id="recordSessionContent">
                <div class="text-center"><i class="fas fa-spinner fa-spin fa-3x"></i></div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/js/adminlte.min.js"></script>

<script>
    function showFinanceDetail(studentId) {
        if (!studentId) return;
        $('#financeDetailModal').modal('show');
        $('#financeDetailContent').html('<div class="text-center"><i class="fas fa-spinner fa-spin fa-3x"></i></div>');
        $.get('/admin/students/detail/' + studentId, function(data) {
            var html = '<div class="row"><div class="col-md-5">';
            html += '<div class="text-center mb-3">';
            html += '<div style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#28a745,#20c997);color:white;display:inline-flex;align-items:center;justify-content:center;font-size:30px;font-weight:bold;">' + (data.studentName ? data.studentName.substring(0,1) : '?') + '</div>';
            html += '<h5 class="mt-2">' + (data.studentName || 'N/A') + '</h5>';
            html += '<p><i class="fas fa-phone"></i> ' + (data.phone || 'N/A') + '</p>';
            html += '<p><i class="fas fa-envelope"></i> ' + (data.email || 'N/A') + '</p>';
            html += '</div></div>';
            html += '<div class="col-md-7"><h6>Tổng nợ: <span class="text-danger font-weight-bold">' + formatMoney(data.totalDebt || 0) + ' VNĐ</span></h6>';
            html += '<h6>Đã đóng: <span class="text-success">' + formatMoney(data.totalPaid || 0) + ' VNĐ</span></h6>';
            if (data.finances && data.finances.length > 0) {
                html += '<hr><h6>Chi tiết từng khóa:</h6>';
                data.finances.forEach(function(f) {
                    var statusClass = f.status === 'PAID' ? 'success' : (f.status === 'OVERDUE' ? 'danger' : 'warning');
                    html += '<div class="card mb-2"><div class="card-body py-2">';
                    html += '<strong>' + f.courseName + '</strong> ';
                    html += '<span class="badge badge-' + statusClass + '">' + f.status + '</span><br>';
                    html += '<small>' + f.sessionsCount + ' buổi | Tổng: ' + formatMoney(f.totalAmount) + ' | Đã đóng: ' + formatMoney(f.paidAmount) + ' | Nợ: ' + formatMoney(f.debtAmount) + '</small>';
                    html += '<br><button class="btn btn-success btn-sm mt-1" onclick="quickPay(' + f.id + ', ' + f.debtAmount + ')"><i class="fas fa-money-bill"></i> Đóng ngay</button>';
                    html += '</div></div>';
                });
            }
            html += '</div></div>';
            $('#financeDetailContent').html(html);
        });
    }

    function showPaymentModal(studentId) {
        if (!studentId) return;
        $('#paymentModal').modal('show');
        $('#paymentContent').html('<div class="text-center"><i class="fas fa-spinner fa-spin fa-3x"></i></div>');
        $.get('/admin/students/detail/' + studentId, function(data) {
            var html = '<h6>' + (data.studentName || 'Học sinh') + '</h6>';
            html += '<p>Tổng nợ: <strong class="text-danger">' + formatMoney(data.totalDebt || 0) + ' VNĐ</strong></p>';
            if (data.finances && data.finances.length > 0) {
                html += '<form id="paymentForm">';
                html += '<div class="form-group"><label>Chọn khóa học</label><select id="financeSelect" class="form-control">';
                data.finances.forEach(function(f) {
                    if (f.debtAmount > 0) {
                        html += '<option value="' + f.id + '" data-debt="' + f.debtAmount + '">' + f.courseName + ' (Nợ: ' + formatMoney(f.debtAmount) + ')</option>';
                    }
                });
                html += '</select></div>';
                html += '<div class="form-group"><label>Số tiền đóng</label><div class="input-group">';
                html += '<input type="number" id="paymentAmount" class="form-control" placeholder="Nhập số tiền" step="1000" min="1000">';
                html += '<div class="input-group-append"><span class="input-group-text">VNĐ</span></div></div>';
                html += '<small><a href="#" onclick="payFull()">Đóng toàn bộ</a> | <a href="#" onclick="payHalf()">Đóng 1 nửa</a></small></div>';
                html += '<div class="form-group"><label>Ghi chú</label><input type="text" id="paymentNote" class="form-control"></div>';
                html += '<button type="button" class="btn btn-success btn-block" onclick="submitPayment()"><i class="fas fa-check"></i> Xác nhận đóng tiền</button>';
                html += '</form>';
            } else {
                html += '<p class="text-success">Không có khoản nợ nào!</p>';
            }
            $('#paymentContent').html(html);
        });
    }

    function submitPayment() {
        var financeId = $('#financeSelect').val();
        var amount = $('#paymentAmount').val();
        var note = $('#paymentNote').val();
        if (!financeId || !amount || amount <= 0) { alert('Vui lòng nhập số tiền hợp lệ!'); return; }
        $.post('/admin/students/pay', { financeId: financeId, amount: amount, note: note }, function(result) {
            if (result.success) { alert('Đóng tiền thành công! Còn nợ: ' + formatMoney(result.remaining) + ' VNĐ'); location.reload(); }
        });
    }

    function quickPay(financeId, debtAmount) {
        if (confirm('Xác nhận đóng toàn bộ ' + formatMoney(debtAmount) + ' VNĐ?')) {
            $.post('/admin/students/pay', { financeId: financeId, amount: debtAmount }, function(result) {
                if (result.success) { alert('Đã đóng thành công!'); location.reload(); }
            });
        }
    }

    function payFull() { var debt = $('#financeSelect option:selected').data('debt'); $('#paymentAmount').val(debt); }
    function payHalf() { var debt = $('#financeSelect option:selected').data('debt'); $('#paymentAmount').val(Math.floor(debt / 2)); }

    function showRecordSession(studentId) {
        if (!studentId) return;
        $('#recordSessionModal').modal('show');
        $('#recordSessionContent').html('<div class="text-center"><i class="fas fa-spinner fa-spin fa-3x"></i></div>');
        $.get('/admin/students/detail/' + studentId, function(data) {
            var html = '<h6>' + (data.studentName || 'Học sinh') + '</h6>';
            html += '<form id="sessionForm">';
            html += '<div class="form-group"><label>Chọn khóa học</label><select id="sessionCourseSelect" class="form-control">';
            if (data.finances && data.finances.length > 0) {
                data.finances.forEach(function(f) {
                    html += '<option value="' + f.id + '">' + f.courseName + '</option>';
                });
            }
            html += '</select></div>';
            html += '<div class="form-group"><label>Ghi chú</label><input type="text" id="sessionNote" class="form-control"></div>';
            html += '<button type="button" class="btn btn-warning btn-block" onclick="submitSession(' + studentId + ')"><i class="fas fa-check"></i> Ghi nhận buổi học</button>';
            html += '</form>';
            $('#recordSessionContent').html(html);
        });
    }

    function submitSession(studentId) {
        var note = $('#sessionNote').val();
        $.get('/admin/students/detail/' + studentId, function(data) {
            var selectedIndex = $('#sessionCourseSelect').prop('selectedIndex');
            var finance = data.finances ? data.finances[selectedIndex] : null;
            $.post('/admin/students/record-session', { studentId: studentId, courseId: finance ? finance.courseId : 1, note: note }, function(result) {
                if (result.success) { alert('Đã ghi nhận buổi học! Tổng: ' + result.sessionsCount + ' buổi'); location.reload(); }
            });
        });
    }

    function formatMoney(amount) {
        if (!amount) return '0';
        return amount.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }
</script>
</body>
</html>
