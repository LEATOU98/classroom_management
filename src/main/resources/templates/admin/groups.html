<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Nhóm học - Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        .filter-section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">

    <!-- HEADER - Fragment -->
    <div th:replace="~{fragments/header :: header}"></div>

    <!-- SIDEBAR ADMIN - Fragment -->
    <div th:replace="~{fragments/sidebar :: adminSidebar}"></div>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <h1 class="m-0">Quản lý Nhóm học</h1>
            </div>
        </div>

        <section class="content">
            <div class="container-fluid">
                <!-- Filter -->
                <div class="filter-section">
                    <form th:action="@{/admin/groups}" method="get" class="row align-items-end">
                        <div class="col-md-3 mb-2">
                            <label>Tìm kiếm</label>
                            <input type="text" name="search" class="form-control" placeholder="Tên nhóm, khóa học..." th:value="${searchKeyword}">
                        </div>
                        <div class="col-md-3 mb-2">
                            <label>Giáo viên</label>
                            <select name="teacherId" id="teacherSelect" class="form-control" onchange="this.form.submit()">
                                <option value="">Tất cả</option>
                                <option th:each="teacher : ${teachers}" th:value="${teacher.id}" th:text="${teacher.fullName}" th:selected="${selectedTeacherId == teacher.id}"></option>
                            </select>
                        </div>
                        <div class="col-md-3 mb-2">
                            <label>Khóa học</label>
                            <select name="courseId" class="form-control" onchange="this.form.submit()">
                                <option value="">Tất cả</option>
                                <option th:each="course : ${filteredCourses}" th:value="${course.id}" th:text="${course.courseName}" th:selected="${selectedCourseId == course.id}"></option>
                            </select>
                        </div>
                        <div class="col-md-2 mb-2">
                            <label>&nbsp;</label>
                            <button type="submit" class="btn btn-primary btn-block"><i class="fas fa-filter"></i> Lọc</button>
                        </div>
                        <div class="col-md-1 mb-2">
                            <label>&nbsp;</label>
                            <a href="/admin/groups" class="btn btn-outline-secondary btn-block"><i class="fas fa-redo"></i></a>
                        </div>
                    </form>
                </div>

                <!-- Table -->
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title"><i class="fas fa-list mr-2"></i>Danh sách nhóm <span class="badge badge-info ml-2" th:text="${#lists.size(groups)}"></span></h3>
                        <div class="card-tools">
                            <a href="/admin/groups/create" class="btn btn-success btn-sm"><i class="fas fa-plus"></i> Tạo nhóm mới</a>
                        </div>
                    </div>
                    <div class="card-body table-responsive p-0">
                        <table class="table table-hover">
                            <thead>
                            <tr>
                                <th>STT</th>
                                <th>Tên nhóm</th>
                                <th>Mô tả</th>
                                <th>Khóa học</th>
                                <th>Giáo viên</th>
                                <th>Hành động</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="group, iterStat : ${groups}">
                                <td th:text="${iterStat.index + 1}"></td>
                                <td><strong th:text="${group.groupName}"></strong></td>
                                <td><small th:text="${group.description}"></small></td>
                                <td><span class="badge badge-primary" th:text="${group.course.courseName}"></span></td>
                                <td><span th:text="${group.teacher.fullName}"></span></td>
                                <td>
                                    <div class="btn-group btn-group-sm">
                                        <a th:href="@{/admin/groups/{id}/members(id=${group.id})}" class="btn btn-info" title="Thành viên"><i class="fas fa-users"></i></a>
                                        <button type="button" class="btn btn-secondary" onclick="showGroupDetail([[${group.id}]])" title="Chi tiết"><i class="fas fa-info-circle"></i></button>
                                        <a th:href="@{/admin/groups/edit/{id}(id=${group.id})}" class="btn btn-warning" title="Sửa"><i class="fas fa-edit"></i></a>
                                        <a th:href="@{/admin/groups/delete/{id}(id=${group.id})}" class="btn btn-danger" title="Xóa" onclick="return confirm('Xác nhận xóa?')"><i class="fas fa-trash"></i></a>
                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- FOOTER - Fragment -->
    <div th:replace="~{fragments/footer :: footer}"></div>

</div>

<!-- Modal Chi tiết -->
<div class="modal fade" id="groupDetailModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-info text-white">
                <h5 class="modal-title"><i class="fas fa-layer-group mr-2"></i>Chi tiết nhóm</h5>
                <button type="button" class="close text-white" data-dismiss="modal">&times;</button>
            </div>
            <div class="modal-body" id="groupDetailContent">
                <div class="text-center"><i class="fas fa-spinner fa-spin fa-3x"></i></div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/js/adminlte.min.js"></script>

<script>
    function showGroupDetail(groupId) {
        $('#groupDetailModal').modal('show');
        $('#groupDetailContent').html('<div class="text-center"><i class="fas fa-spinner fa-spin fa-3x"></i></div>');
        $.get('/admin/groups/detail/' + groupId, function(data) {
            var html = '<div class="row"><div class="col-md-6">';
            html += '<p><strong>Tên nhóm:</strong> ' + data.groupName + '</p>';
            html += '<p><strong>Mô tả:</strong> ' + (data.description || 'Không có') + '</p>';
            html += '<p><strong>Khóa học:</strong> ' + data.courseName + '</p>';
            html += '<p><strong>Giáo viên:</strong> ' + data.teacherName + '</p>';
            html += '</div><div class="col-md-6">';
            html += '<p><strong>Số thành viên:</strong> <span class="badge badge-success">' + data.memberCount + '</span></p>';
            html += '<p><strong>Ngày tạo:</strong> ' + data.createdAt + '</p>';
            html += '</div></div>';
            if (data.members && data.members.length > 0) {
                html += '<hr><h6>Danh sách thành viên:</h6>';
                html += '<table class="table table-sm"><thead><tr><th>#</th><th>Tên học sinh</th><th>Ngày tham gia</th></tr></thead><tbody>';
                data.members.forEach(function(m, i) {
                    html += '<tr><td>' + (i+1) + '</td><td>' + m.studentName + '</td><td>' + m.joinedAt + '</td></tr>';
                });
                html += '</tbody></table>';
            }
            $('#groupDetailContent').html(html);
        });
    }

    $(document).ready(function() {
        $('#teacherSelect').change(function() {
            var teacherId = $(this).val();
            if (teacherId) {
                $.get('/admin/getCoursesByTeacher/' + teacherId, function(courses) {
                    var options = '<option value="">Tất cả khóa học</option>';
                    courses.forEach(function(c) {
                        options += '<option value="' + c.id + '">' + c.courseName + '</option>';
                    });
                    $('select[name="courseId"]').html(options);
                });
            }
        });
    });
</script>
</body>
</html>
