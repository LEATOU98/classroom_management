<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo người dùng mới - Admin</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">

    <!-- HEADER - Fragment -->
    <div th:replace="~{fragments/header :: header}"></div>

    <!-- SIDEBAR ADMIN - Fragment -->
    <div th:replace="~{fragments/sidebar :: adminSidebar}"></div>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <h1 class="m-0">Tạo người dùng mới</h1>
            </div>
        </div>

        <section class="content">
            <div class="container-fluid">
                <div class="card">
                    <div class="card-body">
                        <form th:action="@{/admin/users/create}" method="post" th:object="${user}">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label><i class="fas fa-user mr-1"></i>Tên đăng nhập *</label>
                                        <input type="text" th:field="*{username}" class="form-control" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label><i class="fas fa-lock mr-1"></i>Mật khẩu *</label>
                                        <input type="text" th:field="*{password}" class="form-control" required>
                                    </div>
                                </div>
                            </div>

                            <div class="form-group">
                                <label><i class="fas fa-id-card mr-1"></i>Họ và tên *</label>
                                <input type="text" th:field="*{fullName}" class="form-control" required>
                            </div>

                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label><i class="fas fa-envelope mr-1"></i>Email</label>
                                        <input type="email" th:field="*{email}" class="form-control">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label><i class="fas fa-phone mr-1"></i>Số điện thoại</label>
                                        <input type="text" th:field="*{phone}" class="form-control">
                                    </div>
                                </div>
                            </div>

                            <div class="form-group">
                                <label><i class="fas fa-sticky-note mr-1"></i>Ghi chú</label>
                                <textarea th:field="*{note}" class="form-control" rows="2"
                                          placeholder="Thông tin ghi nhớ..."></textarea>
                            </div>

                            <div class="form-group">
                                <label><i class="fas fa-user-tag mr-1"></i>Vai trò *</label>
                                <select th:field="*{role}" id="roleSelect" class="form-control" required
                                        onchange="toggleStudentFields()">
                                    <option value="">-- Chọn vai trò --</option>
                                    <option th:each="role : ${roles}" th:value="${role}" th:text="${role}"></option>
                                </select>
                            </div>

                            <!-- Student-specific fields -->
                            <div id="studentFields" style="display: none;">
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-group">
                                            <label><i class="fas fa-chalkboard-teacher mr-1"></i>Giáo viên phụ trách *</label>
                                            <select name="assignedTeacherId" id="teacherSelect" class="form-control"
                                                    onchange="loadTeacherCourses()">
                                                <option value="">-- Chọn giáo viên --</option>
                                                <option th:each="teacher : ${teachers}"
                                                        th:value="${teacher.id}"
                                                        th:text="${teacher.fullName}"></option>
                                            </select>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-group">
                                            <label><i class="fas fa-book mr-1"></i>Khóa học (tùy chọn)</label>
                                            <select name="courseId" id="courseSelect" class="form-control">
                                                <option value="">-- Chọn khóa học --</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <hr>
                            <button type="submit" class="btn btn-success btn-lg">
                                <i class="fas fa-save mr-1"></i> Tạo người dùng
                            </button>
                            <a href="/admin/users" class="btn btn-secondary btn-lg">
                                <i class="fas fa-times mr-1"></i> Hủy
                            </a>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- FOOTER - Fragment -->
    <div th:replace="~{fragments/footer :: footer}"></div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/js/adminlte.min.js"></script>

<script>
    function toggleStudentFields() {
        var role = $('#roleSelect').val();
        if (role === 'STUDENT') {
            $('#studentFields').show();
        } else {
            $('#studentFields').hide();
            $('#teacherSelect').val('');
            $('#courseSelect').html('<option value="">-- Chọn khóa học --</option>');
        }
    }

    function loadTeacherCourses() {
        var teacherId = $('#teacherSelect').val();
        if (teacherId) {
            $.get('/admin/getCoursesByTeacher/' + teacherId, function(courses) {
                var options = '<option value="">-- Chọn khóa học --</option>';
                courses.forEach(function(course) {
                    options += '<option value="' + course.id + '">' + course.courseName + '</option>';
                });
                $('#courseSelect').html(options);
            });
        } else {
            $('#courseSelect').html('<option value="">-- Chọn khóa học --</option>');
        }
    }
</script>
</body>
</html>
