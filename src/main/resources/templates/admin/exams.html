<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Bài kiểm tra - Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">
    <div th:replace="~{fragments/header :: header}"></div>
    <div th:replace="~{fragments/sidebar :: adminSidebar}"></div>

    <div class="content-wrapper">
        <div class="content-header"><h1>Quản lý Bài kiểm tra</h1></div>
        <section class="content">
            <div class="container-fluid">
                <!-- Filter -->
                <div class="card mb-3">
                    <div class="card-body">
                        <form th:action="@{/admin/exams}" method="get" class="row">
                            <div class="col-md-3 mb-2">
                                <input type="text" name="search" class="form-control" placeholder="Tìm kiếm..." th:value="${searchKeyword}">
                            </div>
                            <div class="col-md-3 mb-2">
                                <select name="teacherId" class="form-control" onchange="this.form.submit()">
                                    <option value="">Tất cả giáo viên</option>
                                    <option th:each="t : ${teachers}" th:value="${t.id}" th:text="${t.fullName}" th:selected="${selectedTeacherId == t.id}"></option>
                                </select>
                            </div>
                            <div class="col-md-3 mb-2">
                                <select name="courseId" class="form-control" onchange="this.form.submit()">
                                    <option value="">Tất cả khóa học</option>
                                    <option th:each="c : ${allCourses}" th:value="${c.id}" th:text="${c.courseName}" th:selected="${selectedCourseId == c.id}"></option>
                                </select>
                            </div>
                            <div class="col-md-2 mb-2">
                                <button type="submit" class="btn btn-primary btn-block"><i class="fas fa-filter"></i> Lọc</button>
                            </div>
                            <div class="col-md-1 mb-2">
                                <a href="/admin/exams" class="btn btn-outline-secondary btn-block"><i class="fas fa-redo"></i></a>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Table -->
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Danh sách bài kiểm tra <span class="badge badge-info" th:text="${#lists.size(exams)}"></span></h3>
                        <div class="card-tools">
                            <a href="/admin/exams/create" class="btn btn-success btn-sm"><i class="fas fa-plus"></i> Tạo mới</a>
                        </div>
                    </div>
                    <div class="card-body table-responsive p-0">
                        <table class="table table-hover">
                            <thead>
                            <tr>
                                <th>STT</th>
                                <th>Tên bài kiểm tra</th>
                                <th>Mô tả</th>
                                <th>Khóa học</th>
                                <th>Giáo viên</th>
                                <th>Thời gian</th>
                                <th>Hành động</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="exam, iterStat : ${exams}">
                                <td th:text="${iterStat.index + 1}"></td>
                                <td><strong th:text="${exam.examName}"></strong><br><small class="text-muted" th:text="${exam.examCode}"></small></td>
                                <td th:text="${exam.description}"></td>
                                <td><span class="badge badge-primary" th:text="${exam.course.courseName}"></span></td>
                                <td th:text="${exam.teacher.fullName}"></td>
                                <td th:text="${#temporals.format(exam.examDate, 'dd/MM/yyyy HH:mm')}"></td>
                                <td>
                                    <div class="btn-group btn-group-sm">
                                        <a th:href="@{/admin/exams/{id}/scores(id=${exam.id})}" class="btn btn-info" title="Chấm điểm"><i class="fas fa-star"></i></a>
                                        <a th:href="@{/admin/exams/edit/{id}(id=${exam.id})}" class="btn btn-warning" title="Sửa"><i class="fas fa-edit"></i></a>
                                        <a th:href="@{/admin/exams/delete/{id}(id=${exam.id})}" class="btn btn-danger" title="Xóa" onclick="return confirm('Xác nhận xóa?')"><i class="fas fa-trash"></i></a>
                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/js/adminlte.min.js"></script>
</body>
</html>
