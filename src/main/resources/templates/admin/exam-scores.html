<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chấm điểm - Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        .score-input { width: 80px; text-align: center; }
        .graded-badge { font-size: 0.85em; }
    </style>
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">
    <div th:replace="~{fragments/header :: header}"></div>
    <div th:replace="~{fragments/sidebar :: adminSidebar}"></div>

    <div class="content-wrapper">
        <div class="content-header">
            <h1>Chấm điểm: <span class="text-info" th:text="${exam.examName}"></span></h1>
            <p>Khóa: <span th:text="${exam.course.courseName}"></span> | GV: <span th:text="${exam.teacher.fullName}"></span> | Điểm đạt: <span th:text="${exam.passScore}"></span>/<span th:text="${exam.maxScore}"></span></p>
        </div>
        <section class="content">
            <div class="container-fluid">
                <!-- Nút tạo danh sách -->
                <div class="mb-3">
                    <form th:action="@{/admin/exams/{id}/batch-create(id=${exam.id})}" method="post" style="display:inline;">
                        <button type="submit" class="btn btn-primary"><i class="fas fa-plus"></i> Tạo danh sách học sinh</button>
                    </form>
                </div>

                <!-- Bảng điểm -->
                <div class="card">
                    <div class="card-header"><h5>Danh sách điểm (<span th:text="${#lists.size(scores)}"></span>)</h5></div>
                    <div class="card-body table-responsive p-0">
                        <table class="table table-hover">
                            <thead>
                            <tr>
                                <th>STT</th>
                                <th>Học sinh</th>
                                <th>Điểm</th>
                                <th>Nhận xét</th>
                                <th>Trạng thái</th>
                                <th>Người chấm</th>
                                <th>Hành động</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="score, iterStat : ${scores}">
                                <td th:text="${iterStat.index + 1}"></td>
                                <td th:text="${score.student.fullName}"></td>
                                <td>
                                    <span th:if="${score.isGraded}" th:text="${score.score}" class="font-weight-bold"></span>
                                    <span th:unless="${score.isGraded}" class="text-muted">-</span>
                                </td>
                                <td th:text="${score.comment}"></td>
                                <td>
                                    <span class="badge graded-badge" th:classappend="${score.statusClass}" th:text="${score.statusDisplay}"></span>
                                </td>
                                <td th:text="${score.gradedBy?.fullName}"></td>
                                <td>
                                    <button class="btn btn-sm btn-warning" onclick="showGradeModal([[${score.id}]], [[${score.student.fullName}]], [[${score.score}]], '[[${score.comment}]]')">
                                        <i class="fas fa-edit"></i> Chấm
                                    </button>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
</div>

<!-- Modal Chấm điểm -->
<div class="modal fade" id="gradeModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-warning"><h5 class="modal-title">Chấm điểm</h5><button type="button" class="close" data-dismiss="modal">&times;</button></div>
            <div class="modal-body">
                <form id="gradeForm" method="post">
                    <p><strong>Học sinh:</strong> <span id="gradeStudentName"></span></p>
                    <div class="form-group">
                        <label>Điểm số (tối đa: <span th:text="${exam.maxScore}"></span>)</label>
                        <input type="number" id="gradeScore" name="score" class="form-control" step="0.1" th:max="${exam.maxScore}" required>
                    </div>
                    <div class="form-group">
                        <label>Nhận xét</label>
                        <input type="text" id="gradeComment" name="comment" class="form-control">
                    </div>
                    <button type="submit" class="btn btn-warning btn-block"><i class="fas fa-save"></i> Lưu điểm</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/js/adminlte.min.js"></script>
<script>
    function showGradeModal(scoreId, studentName, currentScore, currentComment) {
        $('#gradeStudentName').text(studentName);
        $('#gradeScore').val(currentScore || '');
        $('#gradeComment').val(currentComment || '');
        $('#gradeForm').attr('action', '/admin/exams/{{examId}}/add-score?studentId=' + scoreId);
    }
</script>
</body>
</html>
