<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chấm điểm - Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        .stat-box { border-radius: 10px; padding: 15px; color: white; margin-bottom: 15px; }
        .stat-total { background: linear-gradient(135deg, #667eea, #764ba2); }
        .stat-graded { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .stat-passed { background: linear-gradient(135deg, #43e97b, #38f9d7); }
        .stat-avg { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .not-graded { background: #fff3cd; color: #856404; }
        .passed { background: #d4edda; color: #155724; }
        .failed { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">
    <div th:replace="~{fragments/header :: header}"></div>
    <div th:replace="~{fragments/sidebar :: adminSidebar}"></div>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <h1 class="m-0"><i class="fas fa-star text-warning mr-2"></i>Chấm điểm: <span th:text="${exam.examName}"></span></h1>
                <p>
                    Khóa: <span class="badge badge-primary" th:text="${exam.course.courseName}"></span>
                    | GV: <span th:text="${exam.teacher.fullName}"></span>
                    | Đạt: <span th:text="${exam.passScore}"></span>/<span th:text="${exam.maxScore}"></span>
                </p>
            </div>
        </div>
        <section class="content">
            <div class="container-fluid">
                <div class="row">
                    <div class="col-md-3"><div class="stat-box stat-total text-center"><h3 th:text="${totalStudents}"></h3><p>Tổng HS</p></div></div>
                    <div class="col-md-3"><div class="stat-box stat-graded text-center"><h3 th:text="${gradedCount}"></h3><p>Đã chấm</p></div></div>
                    <div class="col-md-3"><div class="stat-box stat-passed text-center"><h3 th:text="${passedCount}"></h3><p>Đạt</p></div></div>
                    <div class="col-md-3"><div class="stat-box stat-avg text-center"><h3 th:text="${avgScore}"></h3><p>Điểm TB</p></div></div>
                </div>

                <div class="mb-3">
                    <form th:action="@{/admin/exams/{id}/scores/batch-create(id=${exam.id})}" method="post" style="display:inline;">
                        <button type="submit" class="btn btn-primary"><i class="fas fa-sync-alt mr-1"></i> Tạo danh sách</button>
                    </form>
                    <a th:href="@{/admin/exams}" class="btn btn-outline-secondary ml-2"><i class="fas fa-arrow-left mr-1"></i> Quay lại</a>
                </div>

                <div class="card">
                    <div class="card-header"><h5>Danh sách điểm (<span th:text="${#lists.size(scores)}"></span>)</h5></div>
                    <div class="card-body table-responsive p-0">
                        <table class="table table-hover">
                            <thead class="thead-light">
                            <tr>
                                <th>STT</th>
                                <th>Học sinh</th>
                                <th>SĐT</th>
                                <th>Điểm</th>
                                <th>Nhận xét</th>
                                <th>Trạng thái</th>
                                <th>Hành động</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="score, iterStat : ${scores}">
                                <td th:text="${iterStat.index + 1}"></td>
                                <td>
                                    <strong th:text="${score.student.fullName}"></strong>
                                    <br>
                                    <small class="text-muted" th:if="${score.student.note != null and !score.student.note.isEmpty()}" th:text="${'📝 ' + score.student.note}"></small>
                                </td>
                                <td><small th:text="${score.student.phone}"></small></td>
                                <td>
                                    <span th:if="${score.isGraded}" class="font-weight-bold" th:text="${score.score}"></span>
                                    <span th:unless="${score.isGraded}" class="text-muted">-</span>
                                </td>
                                <td><small th:text="${score.comment}"></small></td>
                                <td>
                                    <span class="badge" th:classappend="${!score.isGraded} ? 'not-graded' : (${score.score >= exam.passScore} ? 'passed' : 'failed')" th:text="${score.statusDisplay}"></span>
                                </td>
                                <td>
                                    <button class="btn btn-warning btn-sm grade-btn"
                                            th:attr="data-sid=${score.student.id},data-sname=${score.student.fullName},data-score=${score.score},data-comment=${score.comment}">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <a th:href="@{/admin/exams/scores/delete/{id}(id=${score.id})}" class="btn btn-danger btn-sm" onclick="return confirm('Xóa điểm này?')"><i class="fas fa-trash"></i></a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(scores)}">
                                <td colspan="7" class="text-center py-4">
                                    <i class="fas fa-users fa-3x text-muted mb-2"></i>
                                    <p>Chưa có học sinh</p>
                                    <form th:action="@{/admin/exams/{id}/scores/batch-create(id=${exam.id})}" method="post">
                                        <button type="submit" class="btn btn-primary"><i class="fas fa-plus"></i> Tạo danh sách</button>
                                    </form>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
</div>

<div class="modal fade" id="gradeModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-warning"><h5 class="modal-title">Chấm điểm</h5><button type="button" class="close" data-dismiss="modal">&times;</button></div>
            <div class="modal-body">
                <form id="gradeForm">
                    <input type="hidden" id="studentId" name="studentId">
                    <h5 id="sname" class="text-center mb-3"></h5>
                    <div class="form-group"><label>Điểm (tối đa: <span th:text="${exam.maxScore}"></span>)</label><input type="number" id="scoreInput" name="score" class="form-control form-control-lg text-center" step="0.1" required></div>
                    <div class="form-group"><label>Nhận xét</label><textarea id="commentInput" name="comment" class="form-control" rows="2"></textarea></div>
                    <button type="submit" class="btn btn-warning btn-block btn-lg"><i class="fas fa-save"></i> Lưu điểm</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/js/adminlte.min.js"></script>

<script>
    // Lấy examId từ URL: /admin/exams/{id}/scores
    var pathParts = window.location.pathname.split('/');
    var examId = pathParts[3]; // exams/1/scores -> 1

    $(document).on('click', '.grade-btn', function() {
        $('#studentId').val($(this).data('sid'));
        $('#sname').text($(this).data('sname'));
        var currentScore = $(this).data('score');
        $('#scoreInput').val(currentScore || '');
        $('#commentInput').val($(this).data('comment') || '');
        $('#gradeModal').modal('show');
    });

    $('#gradeForm').on('submit', function(e) {
        e.preventDefault();
        var scoreVal = $('#scoreInput').val().replace(',', '.');
        console.log('Saving score for examId:', examId, 'studentId:', $('#studentId').val());
        $.post('/admin/exams/' + examId + '/scores/save', {
            studentId: $('#studentId').val(),
            score: scoreVal,
            comment: $('#commentInput').val()
        }, function(r) {
            if(r.success) { alert(r.message); location.reload(); }
            else { alert(r.message); }
        });
    });
</script>
</body>
</html>
