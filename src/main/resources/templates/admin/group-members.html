<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thành viên nhóm - Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">

    <!-- HEADER - Fragment -->
    <div th:replace="~{fragments/header :: header}"></div>

    <!-- SIDEBAR ADMIN - Fragment -->
    <div th:replace="~{fragments/sidebar :: adminSidebar}"></div>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <h1 class="m-0">Thành viên nhóm: <span class="text-info" th:text="${group.groupName}"></span></h1>
                <p>Khóa: <span th:text="${group.course.courseName}"></span> | GV: <span th:text="${group.teacher.fullName}"></span></p>
            </div>
        </div>
        <section class="content">
            <div class="container-fluid">
                <div class="row">
                    <!-- Danh sách thành viên -->
                    <div class="col-md-8">
                        <div class="card">
                            <div class="card-header"><h5>Danh sách thành viên (<span th:text="${#lists.size(members)}"></span>)</h5></div>
                            <div class="card-body table-responsive p-0">
                                <table class="table table-hover">
                                    <thead><tr><th>STT</th><th>Tên học sinh</th><th>Ngày tham gia</th><th>Hành động</th></tr></thead>
                                    <tbody>
                                    <tr th:each="member, iterStat : ${members}">
                                        <td th:text="${iterStat.index + 1}"></td>
                                        <td th:text="${member.student.fullName}"></td>
                                        <td th:text="${#temporals.format(member.joinedAt, 'dd/MM/yyyy')}"></td>
                                        <td>
                                            <a th:href="@{/admin/groups/remove-member/{id}(id=${member.id})}"
                                               class="btn btn-danger btn-sm" onclick="return confirm('Xóa thành viên này?')">
                                                <i class="fas fa-user-minus"></i>
                                            </a>
                                        </td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- Thêm học sinh -->
                    <div class="col-md-4">
                        <div class="card">
                            <div class="card-header"><h5>Thêm học sinh</h5></div>
                            <div class="card-body">
                                <form th:action="@{/admin/groups/{id}/add-student(id=${group.id})}" method="post">
                                    <div class="form-group">
                                        <select name="studentId" class="form-control" required>
                                            <option value="">-- Chọn học sinh --</option>
                                            <option th:each="student : ${availableStudents}" th:value="${student.id}" th:text="${student.fullName}"></option>
                                        </select>
                                    </div>
                                    <button type="submit" class="btn btn-primary btn-block"><i class="fas fa-user-plus"></i> Thêm</button>
                                </form>
                            </div>
                        </div>

                        <!-- Chuyển nhóm -->
                        <div class="card mt-3">
                            <div class="card-header"><h5>Chuyển nhóm</h5></div>
                            <div class="card-body">
                                <form th:action="@{/admin/groups/transfer-student}" method="post">
                                    <input type="hidden" name="fromGroupId" th:value="${group.id}">
                                    <div class="form-group">
                                        <label>Học sinh</label>
                                        <select name="studentId" class="form-control" required>
                                            <option value="">-- Chọn --</option>
                                            <option th:each="member : ${members}" th:value="${member.student.id}" th:text="${member.student.fullName}"></option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label>Chuyển đến nhóm</label>
                                        <input type="number" name="toGroupId" class="form-control" placeholder="Nhập ID nhóm mới" required>
                                    </div>
                                    <button type="submit" class="btn btn-warning btn-block"><i class="fas fa-exchange-alt"></i> Chuyển</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
                <a th:href="@{/admin/groups}" class="btn btn-secondary mt-3"><i class="fas fa-arrow-left"></i> Quay lại</a>
            </div>
        </section>
    </div>

    <!-- FOOTER - Fragment -->
    <div th:replace="~{fragments/footer :: footer}"></div>

</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/js/adminlte.min.js"></script>
</body>
</html>
