<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Điểm số - Học viên</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">
    <div th:replace="~{fragments/header :: header}"></div>
    <div th:replace="~{fragments/sidebar :: studentSidebar}"></div>

    <div class="content-wrapper">
        <div class="content-header"><h1>Điểm số của tôi</h1></div>
        <section class="content">
            <div class="container-fluid">
                <!-- Điểm trung bình -->
                <div class="row">
                    <div class="col-md-4">
                        <div class="info-box bg-info">
                            <span class="info-box-icon"><i class="fas fa-star"></i></span>
                            <div class="info-box-content">
                                <span class="info-box-text">Điểm trung bình</span>
                                <span class="info-box-number" th:text="${averageScore != null ? #numbers.formatDecimal(averageScore, 1, 1) : 'Chưa có'}"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Bảng điểm -->
                <div class="card">
                    <div class="card-header"><h5>Danh sách điểm</h5></div>
                    <div class="card-body table-responsive p-0">
                        <table class="table table-hover">
                            <thead>
                            <tr>
                                <th>STT</th>
                                <th>Bài kiểm tra</th>
                                <th>Khóa học</th>
                                <th>Ngày kiểm tra</th>
                                <th>Điểm</th>
                                <th>Trạng thái</th>
                                <th>Nhận xét</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="score, iterStat : ${scores}">
                                <td th:text="${iterStat.index + 1}"></td>
                                <td th:text="${score.exam.examName}"></td>
                                <td th:text="${score.exam.course.courseName}"></td>
                                <td th:text="${#temporals.format(score.exam.examDate, 'dd/MM/yyyy')}"></td>
                                <td>
                                    <span th:if="${score.isGraded}" class="font-weight-bold" th:text="${score.score}"></span>
                                    <span th:unless="${score.isGraded}" class="text-muted">Chưa chấm</span>
                                </td>
                                <td>
                                    <span class="badge" th:classappend="${score.statusClass}" th:text="${score.statusDisplay}"></span>
                                </td>
                                <td th:text="${score.comment}"></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/js/adminlte.min.js"></script>
</body>
</html>
