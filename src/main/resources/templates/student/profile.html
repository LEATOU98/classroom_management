<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ Học viên</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <style>
        .profile-avatar-large {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(40, 167, 69, 0.3);
        }
        .course-item {
            border-left: 3px solid #28a745;
            padding: 10px;
            margin-bottom: 10px;
            background: #f8f9fa;
            border-radius: 5px;
        }
    </style>
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">

    <!-- HEADER - Fragment -->
    <div th:replace="~{fragments/header :: header}"></div>

    <!-- SIDEBAR STUDENT - Fragment -->
    <div th:replace="~{fragments/sidebar :: studentSidebar}"></div>

    <!-- Content -->
    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6">
                        <h1 class="m-0">Hồ sơ Học viên</h1>
                    </div>
                </div>
            </div>
        </div>

        <section class="content">
            <div class="container-fluid">
                <div class="row">
                    <!-- Thông tin cơ bản -->
                    <div class="col-md-4">
                        <div class="card">
                            <div class="card-body text-center">
                                <div class="profile-avatar-large">
                                    <i class="fas fa-user-graduate fa-5x"></i>
                                </div>
                                <h3 th:text="${user.fullName}"></h3>
                                <p class="text-muted">
                                    <span class="badge badge-success" th:text="${user.role}"></span>
                                </p>
                                <hr>
                                <p><i class="fas fa-envelope mr-2"></i><span th:text="${user.email}"></span></p>
                                <p><i class="fas fa-phone mr-2"></i><span th:text="${user.phone}"></span></p>
                                <p><i class="fas fa-calendar mr-2"></i>Tham gia: <span th:text="${user.formattedCreatedAt}"></span></p>

                                <div class="mt-3 p-3 bg-light rounded">
                                    <h4 th:text="${#lists.size(enrollments)}">0</h4>
                                    <small>Khóa học đã đăng ký</small>
                                </div>

                                <div class="mt-3 text-left">
                                    <h6>Khóa học đang học:</h6>
                                    <div th:each="enrollment : ${enrollments}" class="course-item">
                                        <strong th:text="${enrollment.course.courseName}"></strong>
                                        <br>
                                        <small class="text-muted">
                                            GV: <span th:text="${enrollment.course.teacher.fullName}"></span>
                                        </small>
                                    </div>
                                    <div th:if="${#lists.isEmpty(enrollments)}" class="text-center text-muted">
                                        <p>Chưa đăng ký khóa học nào</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Form chỉnh sửa -->
                    <div class="col-md-8">
                        <div class="card">
                            <div class="card-header">
                                <h3 class="card-title">Chỉnh sửa thông tin</h3>
                            </div>
                            <div class="card-body">
                                <div th:if="${param.success}" class="alert alert-success">
                                    <i class="fas fa-check-circle"></i> Cập nhật thành công!
                                </div>

                                <form th:action="@{/student/profile}" method="post" th:object="${user}">
                                    <div class="row">
                                        <div class="col-md-6">
                                            <div class="form-group">
                                                <label>Tên đăng nhập</label>
                                                <input type="text" th:field="*{username}" class="form-control" readonly>
                                            </div>
                                        </div>
                                        <div class="col-md-6">
                                            <div class="form-group">
                                                <label>Mật khẩu mới</label>
                                                <input type="text" th:field="*{password}" class="form-control"
                                                       placeholder="Để trống nếu không đổi">
                                            </div>
                                        </div>
                                    </div>

                                    <div class="form-group">
                                        <label>Họ và tên</label>
                                        <input type="text" th:field="*{fullName}" class="form-control" required>
                                    </div>

                                    <div class="row">
                                        <div class="col-md-6">
                                            <div class="form-group">
                                                <label>Email</label>
                                                <input type="email" th:field="*{email}" class="form-control">
                                            </div>
                                        </div>
                                        <div class="col-md-6">
                                            <div class="form-group">
                                                <label>Số điện thoại</label>
                                                <input type="text" th:field="*{phone}" class="form-control">
                                            </div>
                                        </div>
                                    </div>

                                    <button type="submit" class="btn btn-success">
                                        <i class="fas fa-save mr-1"></i> Cập nhật
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- FOOTER - Fragment -->
    <div th:replace="~{fragments/footer :: footer}"></div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/js/adminlte.min.js"></script>
</body>
</html>
