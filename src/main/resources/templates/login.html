<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | Quản Lý Lớp Học</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #4e54c8 0%, #8f94fb 100%);
            position: relative;
            overflow: hidden;
        }

        /* Trang trí nền */
        .bg-shape {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
        }
        .shape1 { width: 300px; height: 300px; top: -80px; left: -80px; }
        .shape2 { width: 400px; height: 400px; bottom: -120px; right: -100px; }
        .shape3 { width: 150px; height: 150px; top: 60%; left: 5%; }

        .login-wrapper {
            position: relative;
            z-index: 2;
            min-height: 100vh;
        }

        .brand-box {
            text-align: center;
            margin-bottom: 28px;
        }

        .brand-icon {
            width: 78px;
            height: 78px;
            border-radius: 20px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }

        .brand-icon i {
            font-size: 34px;
            color: #fff;
        }

        .brand-title {
            color: #fff;
            font-weight: 700;
            font-size: 26px;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .brand-subtitle {
            color: rgba(255,255,255,0.85);
            font-size: 14px;
        }

        .login-card {
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            border: none;
            overflow: hidden;
        }

        .login-card .card-body {
            padding: 2.5rem 2.2rem;
        }

        .form-label {
            font-weight: 500;
            font-size: 14px;
            color: #444;
        }

        .input-group-text {
            background: #f4f5f9;
            border-right: none;
            color: #7b7f9e;
        }

        .form-control {
            border-left: none;
            padding: 0.65rem 0.9rem;
        }

        .input-group:focus-within .input-group-text,
        .input-group:focus-within .form-control {
            border-color: #6a6fd6;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #6a6fd6;
        }

        .btn-login {
            background: linear-gradient(135deg, #4e54c8 0%, #8f94fb 100%);
            border: none;
            font-weight: 600;
            letter-spacing: 0.3px;
            padding: 0.7rem;
            border-radius: 10px;
            transition: 0.25s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(78, 84, 200, 0.35);
        }

        .divider-hint {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 1.5rem;
            color: #9a9dbf;
            font-size: 12.5px;
        }

        .hint-box {
            background: #f4f5fb;
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 13px;
            color: #6a6fd6;
            font-weight: 500;
        }

        footer-note {
            display: block;
        }

        .footer-note {
            text-align: center;
            color: rgba(255,255,255,0.75);
            font-size: 12.5px;
            margin-top: 22px;
        }

        .alert {
            border-radius: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="bg-shape shape1"></div>
<div class="bg-shape shape2"></div>
<div class="bg-shape shape3"></div>

<div class="container login-wrapper d-flex align-items-center">
    <div class="row justify-content-center w-100">
        <div class="col-md-5 col-lg-4">

            <!-- Thương hiệu -->
            <div class="brand-box">
                <div class="brand-icon">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <div class="brand-title">QUẢN LÝ LỚP HỌC</div>
                <div class="brand-subtitle">Hệ thống quản lý học sinh &amp; khóa học</div>
            </div>

            <!-- Form đăng nhập -->
            <div class="card login-card">
                <div class="card-body">
                    <h5 class="text-center mb-4 fw-semibold text-dark">Đăng nhập tài khoản</h5>

                    <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center">
                        <i class="fas fa-exclamation-circle me-2"></i>
                        Sai tên đăng nhập hoặc mật khẩu!
                    </div>

                    <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center">
                        <i class="fas fa-check-circle me-2"></i>
                        Đăng xuất thành công!
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Tên đăng nhập</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user"></i></span>
                                <input type="text" name="username" class="form-control"
                                       placeholder="Nhập tên đăng nhập" required autofocus>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Mật khẩu</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" name="password" class="form-control"
                                       placeholder="Nhập mật khẩu" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-login btn-primary w-100 text-white">
                            <i class="fas fa-sign-in-alt me-2"></i>Đăng nhập
                        </button>
                    </form>

                    <div class="divider-hint">
                        <hr class="flex-grow-1">
                        <span>Thông tin thử nghiệm</span>
                        <hr class="flex-grow-1">
                    </div>

                    <div class="text-center mt-2">
                        <span class="hint-box">
                            <i class="fas fa-key me-1"></i> admin / admin123
                        </span>
                    </div>
                </div>
            </div>

            <div class="footer-note">
                &copy; 2024 Quản Lý Lớp Học. All rights reserved.
            </div>

        </div>
    </div>
</div>

</body>
</html>
