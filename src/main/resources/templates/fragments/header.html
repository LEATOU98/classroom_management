<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<nav th:fragment="header" class="main-header navbar navbar-expand" style="background: linear-gradient(135deg, #4e54c8 0%, #8f94fb 100%); border-bottom: none; box-shadow: 0 2px 10px rgba(78,84,200,0.3);">
    <!-- Left navbar links -->
    <ul class="navbar-nav">
        <li class="nav-item">
            <a class="nav-link text-white" data-widget="pushmenu" href="#" role="button">
                <i class="fas fa-bars"></i>
            </a>
        </li>
        <li class="nav-item d-none d-sm-inline-block">
            <span class="navbar-brand ml-2 text-white">
                <i class="fas fa-school"></i> Hệ thống Quản lý Lớp học
            </span>
        </li>
    </ul>

    <!-- Right navbar links -->
    <ul class="navbar-nav ml-auto">
        <!-- User Info -->
        <li class="nav-item dropdown">
            <a class="nav-link text-white" data-toggle="dropdown" href="#">
                <i class="fas fa-user-circle fa-lg mr-1"></i>
                <span th:text="${currentUser.fullName}"></span>
            </a>
            <div class="dropdown-menu dropdown-menu-right">
                <div class="dropdown-item-text text-center">
                    <i class="fas fa-user-circle fa-3x text-primary mb-2"></i>
                    <h6 th:text="${currentUser.fullName}"></h6>
                    <small class="text-muted" th:text="${currentUser.email}"></small>
                </div>
                <div class="dropdown-divider"></div>
                <!-- Đã bỏ phần Hồ sơ -->
                <a href="/logout" class="dropdown-item text-danger">
                    <i class="fas fa-sign-out-alt mr-2"></i> Đăng xuất
                </a>
            </div>
        </li>

        <!-- Nút Đăng xuất nhanh -->
        <li class="nav-item ml-2">
            <a href="/logout" class="btn btn-outline-light btn-sm">
                <i class="fas fa-sign-out-alt"></i> Đăng xuất
            </a>
        </li>
    </ul>
</nav>

</body>
</html>
