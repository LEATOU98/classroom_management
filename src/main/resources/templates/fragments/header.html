<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>
<header th:fragment="header(username, fullName, role)" class="main-header">
    <nav class="navbar navbar-expand navbar-white navbar-light">
        <!-- Left navbar links -->
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" data-widget="pushmenu" href="#" role="button">
                    <i class="fas fa-bars"></i>
                </a>
            </li>
            <li class="nav-item d-none d-sm-inline-block">
                <span class="navbar-brand ml-2">Hệ thống Quản lý Lớp học</span>
            </li>
        </ul>

        <!-- Right navbar links -->
        <ul class="navbar-nav ml-auto">
            <!-- User Dropdown Menu -->
            <li class="nav-item dropdown user-menu">
                <a href="#" class="nav-link dropdown-toggle" data-toggle="dropdown">
                    <div class="user-avatar">
                        <i class="fas fa-user-circle fa-2x"></i>
                    </div>
                    <span class="d-none d-md-inline" th:text="${fullName}">Tên người dùng</span>
                </a>
                <ul class="dropdown-menu dropdown-menu-lg dropdown-menu-right">
                    <!-- User image -->
                    <li class="user-header">
                        <div class="user-avatar-lg">
                            <i class="fas fa-user-circle fa-4x"></i>
                        </div>
                        <p>
                            <span th:text="${fullName}">Tên người dùng</span>
                            <small th:text="${'Vai trò: ' + role}">Vai trò</small>
                        </p>
                    </li>
                    <!-- Menu Footer-->
                    <li class="user-footer">
                        <a th:href="@{/profile}" class="btn btn-default btn-flat">Hồ sơ</a>
                        <a href="/logout" class="btn btn-default btn-flat float-right">Đăng xuất</a>
                    </li>
                </ul>
            </li>
            <!-- Logout Button -->
            <li class="nav-item">
                <a href="/logout" class="btn btn-outline-danger btn-sm mt-1">
                    <i class="fas fa-sign-out-alt"></i> Đăng xuất
                </a>
            </li>
        </ul>
    </nav>
</header>
</body>
</html>
